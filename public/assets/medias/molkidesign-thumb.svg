
<svg width="100%" height="100%" viewBox="0 0 800 800" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
    <style><![CDATA[
        /* Smooth, seamless CSS-only animations */
        /* 1) Hero shape: soft glow pulse (no movement) */
        #molkidesignShape {
            animation: shape-pulse 3.2s ease-in-out infinite;
            will-change: filter, opacity;
        }
        @keyframes shape-pulse {
            0%, 100% { filter: drop-shadow(0 0 0 rgba(255,255,255,0)); opacity: 1; }
            50% { filter: drop-shadow(0 0 6px rgba(255,255,255,0.35)); opacity: 0.97; }
        }

        /* 2) Text waves: subtle fade/slide with stagger */
        #molkidesignTextMolki > g,
        #molkidesignTextDesign > g {
            opacity: 0;
            animation: text-wave 3.6s ease-in-out infinite;
            will-change: opacity;
        }
        @keyframes text-wave {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Stagger delays for Molki */
        #molkidesignTextMolki > g:nth-child(1) { animation-delay: 0s; }
        #molkidesignTextMolki > g:nth-child(2) { animation-delay: 0.08s; }
        #molkidesignTextMolki > g:nth-child(3) { animation-delay: 0.16s; }
        #molkidesignTextMolki > g:nth-child(4) { animation-delay: 0.24s; }
        #molkidesignTextMolki > g:nth-child(5) { animation-delay: 0.32s; }
        #molkidesignTextMolki > g:nth-child(6) { animation-delay: 0.40s; }
        #molkidesignTextMolki > g:nth-child(7) { animation-delay: 0.48s; }
        #molkidesignTextMolki > g:nth-child(8) { animation-delay: 0.56s; }

        /* Stagger delays for Design (phase-shifted slightly for variety) */
        #molkidesignTextDesign > g:nth-child(1) { animation-delay: 0.2s; }
        #molkidesignTextDesign > g:nth-child(2) { animation-delay: 0.28s; }
        #molkidesignTextDesign > g:nth-child(3) { animation-delay: 0.36s; }
        #molkidesignTextDesign > g:nth-child(4) { animation-delay: 0.44s; }
        #molkidesignTextDesign > g:nth-child(5) { animation-delay: 0.52s; }
        #molkidesignTextDesign > g:nth-child(6) { animation-delay: 0.60s; }

        /* Respect reduced motion */
        @media (prefers-reduced-motion: reduce) {
            #molkidesignShape,
            #molkidesignTextMolki > g,
            #molkidesignTextDesign > g { animation: none !important; }
        }
    ]]></style>
