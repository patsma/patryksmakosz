  <style><![CDATA[
    /* Simple, lightweight looped animation for thumbnail preview */
  

    /* Bars staggered fade using slices */
    #bars .slice { opacity: 0; animation: bars-fade 3.6s ease-in-out infinite; }
    #bars .slice-1 { animation-delay: 0s; }
    #bars .slice-2 { animation-delay: 0.12s; }
    #bars .slice-3 { animation-delay: 0.24s; }
    #bars .slice-4 { animation-delay: 0.36s; }
    #bars .slice-5 { animation-delay: 0.48s; }
    #bars .slice-6 { animation-delay: 0.6s; }
    @keyframes bars-fade { 0%,100% { opacity: 0; } 50% { opacity: 1; } }

    /* Letters subtle float and staggered fade */
    #letters > path { opacity: 0; animation: letters-fade 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
    #letters > path:nth-child(1) { animation-delay: 0s; }
    #letters > path:nth-child(2) { animation-delay: 0.06s; }
    #letters > path:nth-child(3) { animation-delay: 0.12s; }
    #letters > path:nth-child(4) { animation-delay: 0.18s; }
    #letters > path:nth-child(5) { animation-delay: 0.24s; }
    #letters > path:nth-child(6) { animation-delay: 0.30s; }
    #letters > path:nth-child(7) { animation-delay: 0.36s; }
    #letters > path:nth-child(8) { animation-delay: 0.42s; }
    #letters > path:nth-child(9) { animation-delay: 0.48s; }
    #letters > path:nth-child(10) { animation-delay: 0.54s; }
    #letters > path:nth-child(11) { animation-delay: 0.60s; }
    @keyframes letters-fade { 0%,100% { opacity: 0; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-1px); } }

    @media (prefers-reduced-motion: reduce) {
      #shine rect, #bars, #letters > path { animation: none !important; }
    }
  ]]></style>

